<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | IQ+</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <!-- Back Button -->
    <button onclick="window.location.href='IQ+_Splash.html'" class="absolute top-4 left-4 text-white/70 hover:text-white transition text-sm flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> Back
    </button>
    
    <div class="max-w-md w-full">
        
        <!-- Sign In Card -->
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 mb-8">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-white mb-2">Welcome to IQ+</h1>
                <p class="text-purple-100">Sign in to save your progress</p>
            </div>
            
            <!-- Sign In Buttons -->
            <div class="space-y-4">
                
                <!-- Google Sign In -->
                <button onclick="signInWithGoogle()" class="w-full bg-white hover:bg-gray-50 text-gray-800 font-semibold py-4 px-6 rounded-xl transition flex items-center justify-center gap-3 shadow-lg">
                    <svg class="w-6 h-6" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
                
                <!-- Apple Sign In -->
                <button onclick="signInWithApple()" class="w-full bg-black hover:bg-gray-900 text-white font-semibold py-4 px-6 rounded-xl transition flex items-center justify-center gap-3 shadow-lg">
                    <i class="fa-brands fa-apple text-2xl"></i>
                    Continue with Apple
                </button>
                
                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-white/30"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-transparent text-white/70">or</span>
                    </div>
                </div>
                
                <!-- Email Sign In -->
                <div id="email-form" class="space-y-3">
                    <input type="email" id="email-input" placeholder="Email" 
                           class="w-full px-4 py-3 rounded-xl bg-white/20 border-2 border-white/30 text-white placeholder-white/50 focus:outline-none focus:border-white/60 transition">
                    
                    <div class="relative">
                        <input type="password" 
                               id="password-input" 
                               placeholder="Password" 
                               class="w-full px-4 py-3 rounded-xl bg-white/20 border-2 border-white/30 text-white placeholder-white/50 focus:outline-none focus:border-white/60 transition pr-12"
                               aria-label="Password"
                               aria-required="true">
                        
                        <!-- Show/Hide Password Toggle -->
                        <button type="button"
                                onclick="togglePasswordVisibility()"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white transition"
                                aria-label="Toggle password visibility">
                            <i id="password-toggle-icon" class="fa-solid fa-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                    
                    <button onclick="signInWithEmail()" 
                            id="email-auth-btn"
                            class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-4 px-6 rounded-xl transition shadow-lg">
                        Sign In
                    </button>
                </div>
                
            </div>
            
            <!-- Error Message -->
            <div id="error-message" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-white text-sm">
            </div>
            
        </div>
        
        <!-- Footer -->
        <footer class="text-center">
            <div class="text-sm text-purple-200 space-y-2">
                <p>Version 1.0.0 (Alpha) | Built with ❤️ for learners</p>
                <div class="flex justify-center gap-4 flex-wrap">
                    <a href="privacy.html" class="hover:text-white underline">Privacy Policy</a>
                    <span>•</span>
                    <a href="tos.html" class="hover:text-white underline">Terms of Service</a>
                    <span>•</span>
                    <a href="contact.html" class="hover:text-white underline">Contact</a>
                </div>
                <p class="text-xs mt-4">© 2025 IQ+ Education. Student data protected under FERPA guidelines.</p>
            </div>
        </footer>
        
    </div>

    <script type="module">
        import { auth, provider } from './firebase_config.js';
        import { 
            signInWithPopup, 
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            OAuthProvider 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { db } from './firebase_config.js';

        // Toggle password visibility
        window.togglePasswordVisibility = function() {
            const passwordInput = document.getElementById('password-input');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        };

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 5000);
        }

        // Create user profile in Firestore
        async function createUserProfile(user) {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            
            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    uid: user.uid,
                    email: user.email,
                    username: user.displayName || user.email.split('@')[0],
                    created_at: new Date().toISOString(),
                    curriculum: {},
                    progress: {}
                });
                console.log("✅ User profile created");
            }
        }

        // Handle successful sign in
        async function handleSignInSuccess(user) {
            console.log("✅ Sign in successful:", user.email);
            
            // Check if profile exists
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            
            if (userSnap.exists()) {
                // Profile exists, go to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // No profile, go to create
                window.location.href = 'create.html';
            }
        }

        // Google Sign In
        window.signInWithGoogle = async function() {
            try {
                const result = await signInWithPopup(auth, provider);
                await handleSignInSuccess(result.user);
            } catch (error) {
                console.error("❌ Google sign in error:", error);
                showError("Google sign in failed. Please try again.");
            }
        };

        // Apple Sign In
        window.signInWithApple = async function() {
            try {
                const appleProvider = new OAuthProvider('apple.com');
                const result = await signInWithPopup(auth, appleProvider);
                await handleSignInSuccess(result.user);
            } catch (error) {
                console.error("❌ Apple sign in error:", error);
                showError("Apple sign in failed. Please try again.");
            }
        };

        // Email Sign In / Sign Up
        window.signInWithEmail = async function() {
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;

            if (!email || !password) {
                showError("Please enter email and password");
                return;
            }

            try {
                // Try to create account first - Firebase will error if user exists
                let result;
                try {
                    result = await createUserWithEmailAndPassword(auth, email, password);
                    console.log("✅ New account created");
                } catch (createError) {
                    // If user exists, try to sign in instead
                    if (createError.code === 'auth/email-already-in-use') {
                        result = await signInWithEmailAndPassword(auth, email, password);
                        console.log("✅ Signed in existing user");
                    } else {
                        throw createError;
                    }
                }
                await handleSignInSuccess(result.user);
            } catch (error) {
                console.error("❌ Email auth error:", error);
                
                if (error.code === 'auth/user-not-found') {
                    showError("No account found. Create one?");
                } else if (error.code === 'auth/wrong-password') {
                    showError("Incorrect password");
                } else if (error.code === 'auth/email-already-in-use') {
                    showError("Email already in use. Try signing in.");
                } else if (error.code === 'auth/weak-password') {
                    showError("Password too weak (min 6 characters)");
                } else {
                    showError(error.message);
                }
            }
        };

        // Allow Enter key to submit
        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                signInWithEmail();
            }
        });

        console.log("🔐 Sign in page loaded");
    </script>

</body>
</html>
